<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470">
  <style>
    .title{font:700 28px Arial,sans-serif;fill:#172033}.box{fill:#f4f7fb;stroke:#60708a;stroke-width:2;rx:12}.num{font:700 16px Arial,sans-serif;fill:#275efe}.txt{font:600 15px Arial,sans-serif;fill:#172033}.arrow{stroke:#60708a;stroke-width:3;fill:none;marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#60708a"/></marker></defs>
  <text x="600" y="38" text-anchor="middle" class="title">pMOS Process Flow — 13 Checkpoints</text>
  <g transform="translate(35 80)">
    <rect class="box" x="0" y="0" width="140" height="80"/><text class="num" x="14" y="24">01</text><text class="txt" x="70" y="48" text-anchor="middle">NWell</text>
    <rect class="box" x="165" y="0" width="140" height="80"/><text class="num" x="179" y="24">02</text><text class="txt" x="235" y="48" text-anchor="middle">Gate Oxide</text>
    <rect class="box" x="330" y="0" width="140" height="80"/><text class="num" x="344" y="24">03</text><text class="txt" x="400" y="48" text-anchor="middle">Poly Deposit</text>
    <rect class="box" x="495" y="0" width="140" height="80"/><text class="num" x="509" y="24">04</text><text class="txt" x="565" y="48" text-anchor="middle">Gate Pattern</text>
    <rect class="box" x="660" y="0" width="140" height="80"/><text class="num" x="674" y="24">05</text><text class="txt" x="730" y="48" text-anchor="middle">LDD Implant</text>
    <rect class="box" x="825" y="0" width="140" height="80"/><text class="num" x="839" y="24">06</text><text class="txt" x="895" y="48" text-anchor="middle">Spacer Deposit</text>
    <rect class="box" x="990" y="0" width="140" height="80"/><text class="num" x="1004" y="24">07</text><text class="txt" x="1060" y="48" text-anchor="middle">Spacer Etch</text>
    <path class="arrow" d="M140 40 H160"/><path class="arrow" d="M305 40 H325"/><path class="arrow" d="M470 40 H490"/><path class="arrow" d="M635 40 H655"/><path class="arrow" d="M800 40 H820"/><path class="arrow" d="M965 40 H985"/>
    <path class="arrow" d="M1060 80 V145 H985"/>
    <rect class="box" x="0" y="180" width="140" height="80"/><text class="num" x="14" y="204">13</text><text class="txt" x="70" y="228" text-anchor="middle">Final Device</text>
    <rect class="box" x="165" y="180" width="140" height="80"/><text class="num" x="179" y="204">12</text><text class="txt" x="235" y="228" text-anchor="middle">Reflect</text>
    <rect class="box" x="330" y="180" width="140" height="80"/><text class="num" x="344" y="204">11</text><text class="txt" x="400" y="228" text-anchor="middle">Al Etch</text>
    <rect class="box" x="495" y="180" width="140" height="80"/><text class="num" x="509" y="204">10</text><text class="txt" x="565" y="228" text-anchor="middle">Al Deposit</text>
    <rect class="box" x="660" y="180" width="140" height="80"/><text class="num" x="674" y="204">09</text><text class="txt" x="730" y="228" text-anchor="middle">RTA</text>
    <rect class="box" x="825" y="180" width="140" height="80"/><text class="num" x="839" y="204">08</text><text class="txt" x="895" y="228" text-anchor="middle">S/D Implant</text>
    <path class="arrow" d="M825 220 H805"/><path class="arrow" d="M660 220 H640"/><path class="arrow" d="M495 220 H475"/><path class="arrow" d="M330 220 H310"/><path class="arrow" d="M165 220 H145"/>
  </g>
  <text x="600" y="430" text-anchor="middle" style="font:15px Arial,sans-serif;fill:#60708a">SProcess checkpoints from body formation to contact-defined pMOS device</text>
</svg>
